<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20x4 LCD Character Creator</title>
  <style>
    :root {
      --bg: #cad4d8;
      --board: #73bdc6;
      --board-dark: #4ea0aa;
      --lcd-bezel: #121417;
      --lcd-bg: #7ca12f;
      --lcd-dot: #8db236;
      --ink: #193039;
      --panel: #66b3bd;
      --white: #f7fafc;
      --active: #f0fbff;
      --cell-size: 44px;
      --dot-size: 7px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 24px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
    }

    .subtitle {
      margin: 0 0 18px;
      color: #2e5962;
    }

    .workspace {
      background: var(--board);
      border-radius: 14px;
      border: 2px solid #6cb4be;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .board-main {
      display: grid;
      grid-template-columns: minmax(430px, 520px) minmax(620px, 1fr);
      gap: 16px;
      padding: 18px;
      align-items: start;
    }

    .char-panel {
      background: var(--panel);
      border-radius: 10px;
      padding: 12px;
      border: 2px solid #7bc6cf;
    }

    .name-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    input, textarea, button, select {
      border: 1px solid #4a8e97;
      border-radius: 7px;
      background: #effbff;
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
    }

    button { cursor: pointer; }
    button:hover { filter: brightness(0.97); }

    .char-grid-wrap {
      display: grid;
      grid-template-columns: auto auto;
      gap: 12px;
      align-items: center;
    }

    #charGrid {
      display: grid;
      grid-template-columns: repeat(5, var(--cell-size));
      grid-template-rows: repeat(8, var(--cell-size));
      gap: 4px;
      width: fit-content;
      padding: 6px;
      border-radius: 8px;
      background: #7ec5ce;
      border: 1px solid #87d2db;
    }

    .bit {
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: 4px;
      border: 1px dashed rgba(255, 255, 255, 0.7);
      background: rgba(255,255,255,0.1);
    }

    .bit.on {
      background: #f4f7f8;
      border-style: solid;
    }

    .side-controls {
      display: grid;
      gap: 8px;
      align-content: center;
    }

    .lcd-block {
      background: #9ec8cd;
      border-radius: 12px;
      padding: 14px;
      border: 2px solid #8ec0c6;
    }

    .lcd {
      background: var(--lcd-bezel);
      border-radius: 9px;
      padding: 12px;
      box-shadow: inset 0 0 0 1px #000;
      overflow: hidden;
      min-height: 170px;
    }

    #lcdGrid {
      display: grid;
      grid-template-columns: repeat(20, 24px);
      grid-template-rows: repeat(4, 32px);
      gap: 2px;
      width: fit-content;
      margin: auto;
      padding: 8px;
      border-radius: 5px;
      background: var(--lcd-bg);
    }

    .lcd-cell {
      position: relative;
      width: 24px;
      height: 32px;
      border: 1px solid rgba(0,0,0,0.08);
      background: var(--lcd-bg);
      border-radius: 2px;
      cursor: pointer;
    }

    .lcd-cell.active {
      outline: 2px solid #dceca4;
      outline-offset: -2px;
    }

    .dot-grid {
      display: grid;
      grid-template-columns: repeat(5, var(--dot-size));
      grid-template-rows: repeat(8, var(--dot-size));
      gap: 1px;
      position: absolute;
      top: 2px;
      left: 2px;
    }

    .dot { background: var(--lcd-dot); }
    .dot.on { background: #eef9ca; }

    .controls {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(5, minmax(90px, 1fr));
      gap: 8px;
      align-items: end;
    }

    .controls button { min-height: 40px; }

    .controls label {
      display: grid;
      gap: 4px;
      font-size: 0.9rem;
    }

    .frame-panel {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #74afb6;
      background: #b6d9dd;
      display: grid;
      gap: 8px;
    }

    .frame-controls,
    .view-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .frame-meta {
      font-size: 0.9rem;
      color: #22474f;
      margin: 0;
    }

    .code-zone {
      background: #eaf7fb;
      border-top: 8px solid var(--board-dark);
      padding: 14px;
    }

    #code {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.35;
      background: #fff;
    }

    .hint { margin: 8px 0 0; color: #2f5961; font-size: 0.9rem; }

    @media (max-width: 1220px) {
      .board-main { grid-template-columns: 1fr; }
      #lcdGrid { transform-origin: top left; transform: scale(0.9); }
    }
  </style>
</head>
<body>
  <h1>20x4 LCD Character Creator</h1>
  <p class="subtitle">Styled after the LCD Character Creator reference, updated for a 20x4 display.</p>

  <div class="workspace">
    <div class="board-main">
      <section class="char-panel">
        <div class="name-row">
          <input id="charName" value="name0x1" maxlength="24" />
          <button id="clearChar">Clear pixels</button>
        </div>

        <div class="char-grid-wrap">
          <div id="charGrid" aria-label="5x8 character editor"></div>
          <div class="side-controls">
            <button id="shiftUp">▲ Shift up</button>
            <button id="shiftDown">▼ Shift down</button>
            <button id="shiftLeft">◀ Shift left</button>
            <button id="shiftRight">▶ Shift right</button>
            <button id="invert">Invert</button>
          </div>
        </div>
        <p class="hint">Click cells to draw a custom 5x8 character. This maps to one LCD CGRAM slot. Keyboard: arrows move selection, space stamps current char.</p>
      </section>

      <section class="lcd-block">
        <div class="lcd">
          <div id="lcdGrid" aria-label="20 by 4 LCD preview"></div>
        </div>

        <div class="controls">
          <label>CGRAM slot
            <select id="slotSelect"></select>
          </label>
          <label>Row (0-3)
            <input id="rowInput" type="number" min="0" max="3" value="0" />
          </label>
          <label>Col (0-19)
            <input id="colInput" type="number" min="0" max="19" value="0" />
          </label>
          <button id="placeChar">Place char</button>
          <button id="clearDisplay">Clear display</button>
        </div>

        <div class="frame-panel">
          <div class="frame-controls">
            <button id="saveFrame">Save frame</button>
            <button id="prevFrame">◀ Prev</button>
            <button id="nextFrame">Next ▶</button>
            <button id="deleteFrame">Delete frame</button>
            <button id="playFrames">▶ Play</button>
            <label>FPS
              <input id="fpsInput" type="number" min="1" max="12" value="3" />
            </label>
          </div>
          <div class="view-controls">
            <label>Preview zoom
              <input id="zoomInput" type="range" min="70" max="160" value="100" />
            </label>
            <button id="toggleGrid">Hide grid</button>
          </div>
          <p class="frame-meta" id="frameMeta">Frames: 0</p>
        </div>
      </section>
    </div>

    <section class="code-zone">
      <textarea id="code" readonly></textarea>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
        <button id="copyCode">Copy sketch</button>
      </div>
    </section>
  </div>

  <script>
    const ROWS = 4;
    const COLS = 20;
    const DOT_ROWS = 8;
    const DOT_COLS = 5;

    const charGrid = document.getElementById('charGrid');
    const lcdGrid = document.getElementById('lcdGrid');
    const codeEl = document.getElementById('code');

    const state = {
      charPixels: Array.from({ length: DOT_ROWS }, () => Array.from({ length: DOT_COLS }, () => 0)),
      display: Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => null)),
      activeCell: { row: 0, col: 0 },
      frames: [],
      currentFrame: -1,
      isPlaying: false,
      playTimer: null,
      showGrid: true,
    };

    function clamp(v, min, max) {
      return Math.min(max, Math.max(min, v));
    }

    function cloneDisplay(display) {
      return display.map((row) => row.map((cell) => (cell ? cell.map((line) => [...line]) : null)));
    }

    function drawCharGrid() {
      charGrid.innerHTML = '';
      for (let r = 0; r < DOT_ROWS; r++) {
        for (let c = 0; c < DOT_COLS; c++) {
          const btn = document.createElement('button');
          btn.className = 'bit' + (state.charPixels[r][c] ? ' on' : '');
          btn.type = 'button';
          btn.addEventListener('click', () => {
            state.charPixels[r][c] = state.charPixels[r][c] ? 0 : 1;
            drawCharGrid();
            drawLcd();
            updateCode();
          });
          charGrid.appendChild(btn);
        }
      }
    }

    function getRowByte(rowBits) {
      return rowBits.reduce((acc, bit, idx) => acc | (bit ? (1 << (DOT_COLS - 1 - idx)) : 0), 0);
    }

    function toBinLiteral(rowBits) {
      return `B${rowBits.join('')}`;
    }

    function createLcdCell(row, col) {
      const cell = document.createElement('div');
      cell.className = 'lcd-cell';
      if (state.activeCell.row === row && state.activeCell.col === col) {
        cell.classList.add('active');
      }
      if (!state.showGrid) {
        cell.style.borderColor = 'transparent';
      }

      const dotGrid = document.createElement('div');
      dotGrid.className = 'dot-grid';

      const placed = state.display[row][col];
      for (let dr = 0; dr < DOT_ROWS; dr++) {
        for (let dc = 0; dc < DOT_COLS; dc++) {
          const dot = document.createElement('div');
          dot.className = 'dot';
          if (placed && placed[dr][dc]) dot.classList.add('on');
          dotGrid.appendChild(dot);
        }
      }

      cell.appendChild(dotGrid);
      cell.addEventListener('click', () => {
        state.activeCell = { row, col };
        document.getElementById('rowInput').value = row;
        document.getElementById('colInput').value = col;
        const current = state.display[row][col];
        if (current) {
          state.charPixels = current.map((line) => [...line]);
          drawCharGrid();
        }
        drawLcd();
        updateCode();
      });
      return cell;
    }

    function drawLcd() {
      lcdGrid.innerHTML = '';
      const zoom = Number(document.getElementById('zoomInput')?.value || 100);
      lcdGrid.style.transform = `scale(${zoom / 100})`;
      lcdGrid.style.transformOrigin = 'top center';
      lcdGrid.style.marginBottom = `${Math.max(0, zoom - 100) * 1.2}px`;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          lcdGrid.appendChild(createLcdCell(r, c));
        }
      }
    }

    function updateFrameMeta() {
      const frameMeta = document.getElementById('frameMeta');
      if (!state.frames.length) {
        frameMeta.textContent = 'Frames: 0';
      } else {
        frameMeta.textContent = `Frames: ${state.frames.length} | Selected: ${state.currentFrame + 1}/${state.frames.length}`;
      }
    }

    function showFrame(index) {
      if (!state.frames.length) return;
      state.currentFrame = (index + state.frames.length) % state.frames.length;
      state.display = cloneDisplay(state.frames[state.currentFrame]);
      drawLcd();
      updateFrameMeta();
    }

    function stopPlayback() {
      if (state.playTimer) clearInterval(state.playTimer);
      state.playTimer = null;
      state.isPlaying = false;
      document.getElementById('playFrames').textContent = '▶ Play';
    }

    function updateCode() {
      const name = (document.getElementById('charName').value || 'customChar').replace(/\s+/g, '_');
      const slot = Number(document.getElementById('slotSelect').value);
      const row = clamp(Number(document.getElementById('rowInput').value) || 0, 0, ROWS - 1);
      const col = clamp(Number(document.getElementById('colInput').value) || 0, 0, COLS - 1);
      const literals = state.charPixels.map((bits) => toBinLiteral(bits));
      const byteRows = state.charPixels.map((bits) => getRowByte(bits));

      const lines = [];
      lines.push('#include <Wire.h>');
      lines.push('#include <Adafruit_RGBLCDShield.h>');
      lines.push('#include <utility/Adafruit_MCP23017.h>');
      lines.push('');
      lines.push('Adafruit_RGBLCDShield lcd = Adafruit_RGBLCDShield();');
      lines.push('');
      lines.push(`byte ${name}[] = { ${literals.join(', ')} };`);
      if (state.frames.length > 0) {
        lines.push(`const uint8_t frameCount = ${state.frames.length};`);
      }
      lines.push('');
      lines.push('void setup() {');
      lines.push('  lcd.begin(20, 4);');
      lines.push(`  lcd.createChar(${slot}, ${name});`);
      lines.push(`  lcd.setCursor(${col}, ${row});`);
      lines.push(`  lcd.write(${slot});`);
      lines.push('}');
      lines.push('');
      lines.push('void loop() {}');
      lines.push('');
      lines.push('// Decimal byte values (same pattern):');
      lines.push(`// { ${byteRows.join(', ')} }`);
      if (state.frames.length > 0) {
        lines.push('// Animation frames saved in UI (use indexes with your own render logic):');
        lines.push(`// ${state.frames.map((_, idx) => `frame${idx}`).join(', ')}`);
      }

      codeEl.value = lines.join('\n');
    }

    function shift(dx, dy) {
      const next = Array.from({ length: DOT_ROWS }, () => Array.from({ length: DOT_COLS }, () => 0));
      for (let r = 0; r < DOT_ROWS; r++) {
        for (let c = 0; c < DOT_COLS; c++) {
          const nr = r + dy;
          const nc = c + dx;
          if (nr >= 0 && nr < DOT_ROWS && nc >= 0 && nc < DOT_COLS) {
            next[nr][nc] = state.charPixels[r][c];
          }
        }
      }
      state.charPixels = next;
      drawCharGrid();
      drawLcd();
      updateCode();
    }

    function invert() {
      state.charPixels = state.charPixels.map((row) => row.map((v) => (v ? 0 : 1)));
      drawCharGrid();
      drawLcd();
      updateCode();
    }

    document.getElementById('clearChar').addEventListener('click', () => {
      state.charPixels = Array.from({ length: DOT_ROWS }, () => Array.from({ length: DOT_COLS }, () => 0));
      drawCharGrid();
      drawLcd();
      updateCode();
    });

    document.getElementById('placeChar').addEventListener('click', () => {
      const row = clamp(Number(document.getElementById('rowInput').value) || 0, 0, ROWS - 1);
      const col = clamp(Number(document.getElementById('colInput').value) || 0, 0, COLS - 1);
      state.activeCell = { row, col };
      state.display[row][col] = state.charPixels.map((line) => [...line]);
      document.getElementById('colInput').value = clamp(col + 1, 0, COLS - 1);
      drawLcd();
      updateCode();
    });

    document.getElementById('clearDisplay').addEventListener('click', () => {
      stopPlayback();
      state.display = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => null));
      drawLcd();
      updateCode();
    });

    document.getElementById('saveFrame').addEventListener('click', () => {
      state.frames.push(cloneDisplay(state.display));
      state.currentFrame = state.frames.length - 1;
      updateFrameMeta();
      updateCode();
    });

    document.getElementById('deleteFrame').addEventListener('click', () => {
      if (state.currentFrame < 0 || !state.frames.length) return;
      state.frames.splice(state.currentFrame, 1);
      state.currentFrame = Math.min(state.currentFrame, state.frames.length - 1);
      updateFrameMeta();
      updateCode();
    });

    document.getElementById('prevFrame').addEventListener('click', () => showFrame(state.currentFrame - 1));
    document.getElementById('nextFrame').addEventListener('click', () => showFrame(state.currentFrame + 1));

    document.getElementById('playFrames').addEventListener('click', () => {
      if (state.isPlaying) {
        stopPlayback();
        return;
      }
      if (state.frames.length < 2) return;
      const fps = clamp(Number(document.getElementById('fpsInput').value) || 3, 1, 12);
      state.isPlaying = true;
      document.getElementById('playFrames').textContent = '⏸ Pause';
      state.playTimer = setInterval(() => {
        showFrame(state.currentFrame + 1);
      }, Math.round(1000 / fps));
    });

    document.getElementById('shiftUp').addEventListener('click', () => shift(0, -1));
    document.getElementById('shiftDown').addEventListener('click', () => shift(0, 1));
    document.getElementById('shiftLeft').addEventListener('click', () => shift(-1, 0));
    document.getElementById('shiftRight').addEventListener('click', () => shift(1, 0));
    document.getElementById('invert').addEventListener('click', invert);

    document.getElementById('charName').addEventListener('input', updateCode);
    document.getElementById('rowInput').addEventListener('input', updateCode);
    document.getElementById('colInput').addEventListener('input', updateCode);
    document.getElementById('slotSelect').addEventListener('change', updateCode);
    document.getElementById('zoomInput').addEventListener('input', drawLcd);

    document.getElementById('toggleGrid').addEventListener('click', () => {
      state.showGrid = !state.showGrid;
      document.getElementById('toggleGrid').textContent = state.showGrid ? 'Hide grid' : 'Show grid';
      drawLcd();
    });

    document.getElementById('copyCode').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(codeEl.value);
      } catch {
        codeEl.select();
        document.execCommand('copy');
      }
    });

    document.addEventListener('keydown', (evt) => {
      const targetTag = (evt.target && evt.target.tagName) || '';
      if (['INPUT', 'TEXTAREA', 'SELECT'].includes(targetTag)) return;
      let { row, col } = state.activeCell;
      if (evt.key === 'ArrowUp') row = clamp(row - 1, 0, ROWS - 1);
      if (evt.key === 'ArrowDown') row = clamp(row + 1, 0, ROWS - 1);
      if (evt.key === 'ArrowLeft') col = clamp(col - 1, 0, COLS - 1);
      if (evt.key === 'ArrowRight') col = clamp(col + 1, 0, COLS - 1);
      if (evt.key === ' ') {
        state.display[row][col] = state.charPixels.map((line) => [...line]);
        evt.preventDefault();
      }
      state.activeCell = { row, col };
      document.getElementById('rowInput').value = row;
      document.getElementById('colInput').value = col;
      drawLcd();
      updateCode();
    });

    const slotSelect = document.getElementById('slotSelect');
    for (let i = 0; i <= 7; i++) {
      slotSelect.insertAdjacentHTML('beforeend', `<option value="${i}">${i}</option>`);
    }

    drawCharGrid();
    drawLcd();
    updateFrameMeta();
    updateCode();
  </script>
</body>
</html>
